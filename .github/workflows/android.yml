name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Buildozer and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel python3-virtualenv python3-dev build-essential git \
            unzip zip curl wget libssl-dev libffi-dev libsqlite3-dev libjpeg-dev libfreetype6-dev zlib1g-dev \
            libncurses5-dev libbz2-dev liblzma-dev libgdbm-dev libreadline-dev \
            openjdk-17-jdk clang llvm libgl1-mesa-dev libglu1-mesa-dev libpulse-dev libusb-1.0-0-dev
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade cython==0.29.34 buildozer==1.6.0
          python -m pip show buildozer
          buildozer --version

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort
          if [ -d bin ]; then ls -la bin; fi

      - name: Build APK
        run: |
          set -x
          yes | buildozer android debug --verbose

      - name: Debug build output
        if: always()
        run: |
          echo "=== FIND APK ==="
          find . -name '*.apk' -o -name '*.aab' | sort
          if [ -d bin ]; then ls -la bin || true; fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: libraryapp-apk
          path: bin/*.apk
