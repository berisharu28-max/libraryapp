name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Docker Buildozer image
        run: |
          docker run --rm -v "${{ github.workspace }}:/home/user/hostcwd" -w /home/user/hostcwd kivy/buildozer buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: libraryapp-apk
          path: bin/*.apk
